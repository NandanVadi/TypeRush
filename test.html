<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRush - Typing Test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <h2>TypeRush</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Typing Test</h1>
        <p class="subtitle">Measure your typing speed and accuracy.</p>

        <div class="sentence-box">
            <p id="sentence"></p>
        </div>

        <textarea id="input" placeholder="Start typing here..." oninput="checkTyping()"></textarea>

        <div class="stats">
            <p>⏳ <span id="timer">0</span> sec</p>
            <p>⚡ Speed: <span id="wpm">0</span> WPM</p>
            <p>🎯 Accuracy: <span id="accuracy">100</span>%</p>
        </div>

        <button onclick="startTest()">🔄 New Test</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
